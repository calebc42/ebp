name: validate

on:
  push:
    # This file rides the slop-fork line; its branches live under slop-fork/.
    branches: ["slop-fork/**"]
  pull_request:

jobs:
  goldens:
    name: Goldens conform to contract.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 validate.py
